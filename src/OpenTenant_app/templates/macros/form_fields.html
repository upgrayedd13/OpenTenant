{% macro form_group(field, attrs=None) %}
<div class="register-group">
    <label>
        {{ field.label.text }}

        {% if field.description %}
            <span
                class="info-icon"
                data-tooltip="Why we collect this: {{ field.description }}"
            >i</span>
        {% endif %}
    </label>

    {{ field(**(attrs) or {}) }}
</div>
{% endmacro %}
