<div class="form-row">
    <div class="form-group">
        <label>First Name <span class="info-icon"
                data-tooltip="Why we collect this: Lorem ipsum dolor sit amet.">i</span></label>
        <input id="first_name" type="text" required>
    </div>

    <div class="form-group">
        <label>Last Name <span class="info-icon"
                data-tooltip="Why we collect this: Lorem ipsum dolor sit amet.">i</span></label>
        <input id="last_name" type="text" required>
    </div>

    <div class="form-group">
        <label>Pronouns (Optional) <span class="info-icon"
                data-tooltip="Why we collect this: Lorem ipsum dolor sit amet.">i</span></label>
        <select id="pronouns" required>
            <option value="none"></option>
            <option value="he/him">He/Him</option>
            <option value="she/her">She/Her</option>
            <option value="they/them">They/Them</option>
            <option value="other">Other</option>
        </select>
    </div>
</div>

<div class="form-row">
    <div class="form-group">
        <label>Email <span class="info-icon"
                data-tooltip="Why we collect this: Lorem ipsum dolor sit amet.">i</span></label>
        <input id="user_email" type="email" required>
    </div>

    <div class="form-group">
        <label>Phone Number <span class="info-icon"
                data-tooltip="Why we collect this: Lorem ipsum dolor sit amet.">i</span></label>
        <input id="user_phone" type="tel" required>
    </div>

    <div class="form-group">
        <label>Preferred Contact Method <span class="info-icon"
                data-tooltip="Why we collect this: Lorem ipsum dolor sit amet.">i</span></label>
        <select id="contact_method" required>
            <option value="none"></option>
            <option value="phone">Phone</option>
            <option value="email">Email</option>
        </select>
    </div>
</div>

<div class="form-row">
    <div class="form-group">
        <label>Occupation (Optional) <span class="info-icon"
                data-tooltip="Why we collect this: Lorem ipsum dolor sit amet.">i</span></label>
        <input id="occupation" type="text">
    </div>
</div>
